<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Arkham - Cadastro de Pacientes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>Hospital Arkham</h1>
        <p>Manicômio de Gotham</p>
    </header>

    <main>
        <form id="patient-registration-form">
            <h2>Formulário de Admissão</h2>
            <div class="form-group">
                <label for="patient-name">Nome Completo do Paciente</label>
                <input type="text" id="patient-name" name="patient-name" required>
            </div>
            <div class="form-group">
                <label for="birth-date">Data de Nascimento</label>
                <input type="date" id="birth-date" name="birth-date" required>
            </div>
            <div class="form-group">
                <label for="reason">Motivo da Internação</label>
                <textarea id="reason" name="reason" rows="4" required></textarea>
            </div>
            <div class="form-group">
                <label for="emergency-contact">Contato de Emergência</label>
                <input type="text" id="emergency-contact" name="emergency-contact" required>
            </div>
            <button type="submit">Admitir Paciente</button>
        </form>
    </main>

    <script src="main.js"></script>
</body>
</html>
